<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameDash | Play Free Online Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">GAMEDASH</div>
        <input type="text" placeholder="Search games..." class="search-bar">
    </header>

    <main class="game-grid">
        <div class="game-card large" style="background-image: url('subway.jpg');">
            <span class="badge">Trending</span>
        </div>

        <div class="game-card" style="background-image: url('moto.jpg');"></div>
        <div class="game-card" style="background-image: url('chess.jpg');"></div>
        
        <div class="game-card tall" style="background-image: url('monkey.jpg');"></div>

        <div class="game-card" style="background-image: url('car.jpg');"></div>
        <div class="game-card" style="background-image: url('puzzle.jpg');"></div>
        
        <div class="game-card wide" style="background-image: url('battle.jpg');"></div>

        <div class="game-card" style="background-image: url('snake.jpg');"></div>
        <div class="game-card" style="background-image: url('runner.jpg');"></div>
    </main>

</body>
</html>
